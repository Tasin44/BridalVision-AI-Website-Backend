upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name virtual-bridal-fitting-room.weddingworld.de 187.124.12.67;

    # Limit upload size
    client_max_body_size 100M;

    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # If you want nginx to serve static files instead of whitenoise, uncomment this block
    # location /static/ {
    #     alias /app/staticfiles/;
    # }

    # location /media/ {
    #     alias /app/media/;
    # }
}
