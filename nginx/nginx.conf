upstream django_app {
    server web:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name virtual-bridal-fitting-room.weddingworld.de api.virtual-bridal-fitting-room.weddingworld.de 187.124.12.67;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name virtual-bridal-fitting-room.weddingworld.de api.virtual-bridal-fitting-room.weddingworld.de;

    # SSL Certificate files (Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/virtual-bridal-fitting-room.weddingworld.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/virtual-bridal-fitting-room.weddingworld.de/privkey.pem;

    # SSL settings (strong security defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Limit upload size
    client_max_body_size 100M;

    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # If you want nginx to serve static files instead of whitenoise, uncomment this block
    # location /static/ {
    #     alias /app/staticfiles/;
    # }

    location /media/ {
        alias /app/media/;
    }
}
